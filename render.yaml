services:
  - type: web
    name: pettimer-backend
    env: node
    rootDir: server
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: FRONTEND_URL
        sync: false
      - key: DASHSCOPE_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
