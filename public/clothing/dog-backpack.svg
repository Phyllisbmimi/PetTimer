<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 110">
  <!-- Main backpack body -->
  <rect x="20" y="30" width="60" height="70" rx="8" fill="#4169E1" opacity="0.9"/>
  <!-- Front pocket -->
  <rect x="28" y="45" width="44" height="35" rx="5" fill="#1E90FF" opacity="0.85"/>
  <!-- Straps -->
  <path d="M 30 32 Q 25 28, 22 25 L 20 30" fill="#2F4F4F" opacity="0.8" stroke="#1a1a1a" stroke-width="2"/>
  <path d="M 70 32 Q 75 28, 78 25 L 80 30" fill="#2F4F4F" opacity="0.8" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Zipper -->
  <rect x="48" y="48" width="4" height="28" rx="1" fill="#FFD700" opacity="0.9"/>
  <circle cx="50" cy="78" r="3" fill="#FFD700" opacity="0.95"/>
  <!-- Buckles -->
  <rect x="32" y="85" width="8" height="4" rx="1" fill="#8B4513" opacity="0.9"/>
  <rect x="60" y="85" width="8" height="4" rx="1" fill="#8B4513" opacity="0.9"/>
  <!-- Highlights -->
  <rect x="25" y="35" width="10" height="25" rx="3" fill="#ffffff" opacity="0.2"/>
</svg>
