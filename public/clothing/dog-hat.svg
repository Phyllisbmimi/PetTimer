  <!-- Hat body -->
  <rect x="35" y="25" width="50" height="50" rx="5" fill="#1a1a1a" opacity="0.85"/>
  <!-- Hat top -->
  <ellipse cx="60" cy="25" rx="25" ry="8" fill="#2c2c2c" opacity="0.9"/>
  <!-- Highlight -->
  <rect x="38" y="30" width="8" height="20" rx="4" fill="#ffffff" opacity="0.3"/>
  <!-- Band -->
